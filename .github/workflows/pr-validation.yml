name: Pull Request Validation Checks

on:
  pull_request:
    types: [opened, reopened, synchronize]
    branches:
      - '**'

# Restrict all jobs to read-only by default (CKV2_GHA_1).
# Individual jobs that need additional permissions must declare them explicitly.
permissions:
  contents: read

jobs:
  unit-test:
    name: Run Unit Tests with Coverage
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go environment
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run Unit Tests and collect coverage
        run: |
          go test -race ./... -coverprofile=coverage.out
          COVERAGE=$(go tool cover -func=coverage.out | grep total: | awk '{print fmt, $3}' | grep -oE '[0-9]+\.[0-9]+' | head -n 1 || go tool cover -func=coverage.out | grep total: | awk '{print $3}' | tr -d '%')
          echo "Total test coverage is $COVERAGE%"
          COVERAGE_INT=${COVERAGE%.*}
          if [ "$COVERAGE_INT" -lt 80 ]; then
            echo "FAIL: Coverage $COVERAGE% is less than required 80%"
            exit 1
          fi

      - name: Upload coverage report artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.out

  vulnerability-scan:
    name: Run Vulnerability Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go environment
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install govulncheck tool
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          echo "$HOME/go/bin" >> "$GITHUB_PATH"

      - name: Run govulncheck on codebase
        run: |
          set +e
          govulncheck ./... > govulncheck_output.txt 2>&1
          FILTERED_OUTPUT=$(grep -v "GO-2025-4155" govulncheck_output.txt \
            | grep -v "GO-2025-4175" \
            | grep -v "GO-2025-4233" \
            | grep -v "GO-2026-4518" \
            | grep -v "github.com/jackc/pgproto3/v2")
          # GO-2026-4518 (CVE-2026-32286): DoS in jackc/pgproto3/v2 — EOL module, Fixed in: N/A.
          # pgx v4 pulls this transitively; no safe pgproto3/v2 release. Re-evaluate on pgx/v5 migration.
          if echo "$FILTERED_OUTPUT" | grep -q "Vulnerability #"; then
            echo "Found vulnerabilities (excluding GO-2025-4155, GO-2025-4175, GO-2025-4233, GO-2026-4518):"
            echo "$FILTERED_OUTPUT"
            exit 1
          else
            echo "No vulnerabilities found (GO-2025-4155, GO-2025-4175, GO-2025-4233, GO-2026-4518 are ignored)"
          fi

  license-check:
    name: License Compliance Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go environment
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install go-licenses
        run: go install github.com/google/go-licenses@latest

      - name: Check dependency licenses
        run: |
          go-licenses check ./... \
            --allowed_licenses=MIT,Apache-2.0,BSD-2-Clause,BSD-3-Clause,ISC,MPL-2.0,Unlicense,CC0-1.0,0BSD \
            --ignore github.com/produktivai/policy-manager

  golangci-lint:
    name: Run golangci-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install golangci-lint
        run: go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.11.4

      - name: Run golangci-lint
        run: golangci-lint run --timeout=5m 2>&1 | tee golangci-lint.log

      - name: Upload golangci-lint logs artifact
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: golangci-lint-logs
          path: golangci-lint.log

  staticcheck:
    name: Run staticcheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install staticcheck tool
        run: go install honnef.co/go/tools/cmd/staticcheck@latest

      - name: Run staticcheck
        id: staticcheck-run
        run: |
          staticcheck ./... 2>&1 | tee staticcheck.log
          test ${PIPESTATUS[0]} -eq 0

      - name: Upload staticcheck logs artifact
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: staticcheck-logs
          path: staticcheck.log

  checkov-scan:
    name: Run Checkov Dockerfile Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Checkov on Dockerfile
        uses: bridgecrewio/checkov-action@803f802e15372b44bfa1045780e9427936ab2f5b  # v3
        with:
          file: Dockerfile
          framework: dockerfile
          quiet: true
          # CKV_OPENAPI_5: security:[] is the correct OpenAPI pattern for intentionally
          #   public endpoints when a global security scheme is defined.
          # CKV_SECRET_6/4: false positives — field-name strings and connection string
          #   templates in YAML definitions trigger entropy/pattern heuristics.
          skip_check: CKV_OPENAPI_5,CKV_SECRET_6,CKV_SECRET_4

  python-unit-test:
    name: Run Python SDK Unit & Integration Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python SDK dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov pytest-asyncio grpcio grpcio-tools protobuf

      - name: Run Python SDK tests with coverage check
        working-directory: sdk-python
        run: |
          pytest --cov=src/runtime --cov-report=term-missing --cov-fail-under=85

